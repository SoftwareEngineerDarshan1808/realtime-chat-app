<!doctype html>
<html>
  <head>
    <title>Chat App Test</title>
  </head>

  <body>
    <div id="loginBox">
      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <button onclick="login()">Login</button>
    </div>

    <div id="chatBox" style="display: none">
      <p>Status: <span id="status">Connecting...</span></p>
      <p>Online users: <span id="onlineList"></span></p>
      <input id="receiverId" placeholder="Receiver User ID" />
      <input id="msgInput" placeholder="Type a message" />
      <button onclick="sendMessage()">Send</button>
      <ul id="messages"></ul>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      let socket;
      let currentUser;

      async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          alert(data.message);
          return;
        }

        currentUser = data.user;

        socket = io({
          auth: { token: data.token },
        });

        socket.on('connect', () => {
          document.getElementById('loginBox').style.display = 'none';
          document.getElementById('chatBox').style.display = 'block';
          document.getElementById('status').innerText =
            'Connected as ' + data.user.name;
        });

        socket.on('disconnect', (reason) => {
          console.log('Disconnected:', reason);
          document.getElementById('status').innerText = 'Disconnected';
        });

        socket.on('connect_error', (err) => {
          console.error('Connect error:', err.message);
        });

        socket.on('online users', (userIds) => {
          document.getElementById('onlineList').innerText = userIds.join(', ');
        });

        socket.on('private message', (msgData) => {
          const li = document.createElement('li');
          li.textContent = `${msgData.senderName}: ${msgData.text}`;
          document.getElementById('messages').appendChild(li);
        });
      }

      function sendMessage() {
        const receiverId = document.getElementById('receiverId').value;
        const text = document.getElementById('msgInput').value;
        socket.emit('private message', { receiverId, text });
        document.getElementById('msgInput').value = '';
      }
    </script>
  </body>
</html>
