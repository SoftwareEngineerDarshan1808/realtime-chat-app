<!doctype html>
<html>
  <head>
    <title>Chat App Test</title>
  </head>

  <body>
    <div id="loginBox">
      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <button onclick="login()">Login</button>
    </div>
    <div id="chatBox" style="display: none">
      <p>Status: <span id="status">Connecting...</span></p>
      <p>Online users: <span id="onlineList"></span></p>
      <input id="receiverId" placeholder="Receiver User ID" />
      <button onclick="loadHistory()">Load Chat</button>
      <br /><br />
      <input id="msgInput" placeholder="Type a message" />
      <button onclick="sendMessage()">Send</button>
      <ul id="messages"></ul>

      <hr>
      <h4>Group Chats</h4>
      <button onclick="loadAllRooms()">Refresh Room List</button>
      <ul id="roomList"></ul>

      <div id="activeRoomBox" style="display:none;">
        <h4 id="activeRoomName"></h4>
        <button onclick="leaveActiveRoom()">Leave Room</button>
        <button onclick="loadPendingRequests()">View Join Requests</button>
        <ul id="pendingRequests"></ul>

        <br>
        <input id="roomMsgInput" placeholder="Type a room message" />
        <button onclick="sendRoomMessage()">Send to Room</button>
        <ul id="roomMessages"></ul>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      let socket;
      let currentUser;
      let authToken;
      let activeRoomId = null;


      async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          alert(data.message);
          return;
        }

        currentUser = data.user;
        authToken = data.token;

        socket = io({
          auth: { token: data.token },
        });

        socket.on('connect', () => {
          document.getElementById('loginBox').style.display = 'none';
          document.getElementById('chatBox').style.display = 'block';
          document.getElementById('status').innerText =
            'Connected as ' + data.user.name;
        });

        socket.on('disconnect', (reason) => {
          console.log('Disconnected:', reason);
          document.getElementById('status').innerText = 'Disconnected';
        });

        socket.on('connect_error', (err) => {
          console.error('Connect error:', err.message);
          alert('Connection failed: ' + err.message);
        });

        socket.on('error message', (msg) => {
          alert(msg);
        });

        socket.on('online users', (userIds) => {
          document.getElementById('onlineList').innerText = userIds.join(', ');
        });

        socket.on('private message', (msgData) => {
          appendMessage(msgData);
        });

        socket.on('room message', (msgData) => {
          const li = document.createElement('li');
          li.textContent = `[Room] ${msgData.senderName}: ${msgData.text}`;
          document.getElementById('roomMessages').appendChild(li);
        });
      }

      //fetch and render past messages for a conversation
      async function loadHistory() {
        const otherUserId = document.getElementById('receiverId').value;
        if (!otherUserId) return;

        document.getElementById('messages').innerHTML = ''; // clear current view first

        const res = await fetch(`/api/messages/${otherUserId}`, {
          headers: { Authorization: `Bearer ${authToken}` },
        });
        const data = await res.json();

        if (!res.ok) {
          alert(data.message);
          return;
        }

        data.messages.forEach((msg) => {
          appendMessage({
            senderName: msg.sender._id.toString() === currentUser.id.toString() ? currentUser.name : msg.sender.name,
            text: msg.text,
          });
        });
      }

      async function loadAllRooms() {
        const res = await fetch('/api/rooms/all', {
          headers: { Authorization: `Bearer ${authToken}` },
        });
        const data = await res.json();

        const list = document.getElementById('roomList');
        list.innerHTML = '';

        data.rooms.forEach((room) => {
          const li = document.createElement('li');
          li.textContent = `${room.name} (${room.memberCount} members) — `;

          if (room.status === 'joined') {
            const openBtn = document.createElement('button');
            openBtn.textContent = 'Open';
            openBtn.onclick = () => openRoom(room._id, room.name);
            li.appendChild(openBtn);
          } else if (room.status === 'requested') {
            const span = document.createElement('span');
            span.textContent = 'Request pending';
            li.appendChild(span);
          } else {
            const reqBtn = document.createElement('button');
            reqBtn.textContent = 'Request to Join';
            reqBtn.onclick = () => requestJoin(room._id);
            li.appendChild(reqBtn);
          }

          list.appendChild(li);
        });
      }

      async function requestJoin(roomId) {
        const res = await fetch(`/api/rooms/${roomId}/request`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${authToken}` },
        });
        const data = await res.json();
        alert(data.message);
        loadAllRooms();
      }

      function openRoom(roomId, roomName) {
        activeRoomId = roomId;
        document.getElementById('activeRoomBox').style.display = 'block';
        document.getElementById('activeRoomName').innerText = roomName;
        document.getElementById('roomMessages').innerHTML = '';
        document.getElementById('pendingRequests').innerHTML = '';

        socket.emit('join room', roomId); // joins the live socket room
        loadRoomHistory(roomId);
      }

      async function loadRoomHistory(roomId) {
        const res = await fetch(`/api/messages/room/${roomId}`, {
          headers: { Authorization: `Bearer ${authToken}` },
        });
        const data = await res.json();

        data.messages.forEach((msg) => {
          const li = document.createElement('li');
          li.textContent = `[Room] ${msg.sender.name}: ${msg.text}`;
          document.getElementById('roomMessages').appendChild(li);
        });
      }

      async function loadPendingRequests() {
        const res = await fetch(`/api/rooms/${activeRoomId}/requests`, {
          headers: { Authorization: `Bearer ${authToken}` },
        });
        const data = await res.json();

        const list = document.getElementById('pendingRequests');
        list.innerHTML = '';

        data.requests.forEach((r) => {
          const li = document.createElement('li');
          li.textContent = `${r.user.name} wants to join — `;

          const acceptBtn = document.createElement('button');
          acceptBtn.textContent = 'Accept';
          acceptBtn.onclick = () => respondRequest(r.user._id, 'accept');

          const declineBtn = document.createElement('button');
          declineBtn.textContent = 'Decline';
          declineBtn.onclick = () => respondRequest(r.user._id, 'decline');

          li.appendChild(acceptBtn);
          li.appendChild(declineBtn);
          list.appendChild(li);
        });
      }

      async function respondRequest(userId, action) {
        const res = await fetch(`/api/rooms/${activeRoomId}/requests/${userId}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${authToken}`,
          },
          body: JSON.stringify({ action }),
        });
        const data = await res.json();
        alert(data.message);
        loadPendingRequests();
      }

      async function leaveActiveRoom() {
        const res = await fetch(`/api/rooms/${activeRoomId}/leave`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${authToken}` },
        });
        const data = await res.json();
        alert(data.message);

        document.getElementById('activeRoomBox').style.display = 'none';
        activeRoomId = null;
        loadAllRooms();
      }

      function sendRoomMessage() {
        const text = document.getElementById('roomMsgInput').value;
        if (!activeRoomId || !text) return;

        socket.emit('room message', { roomId: activeRoomId, text });
        document.getElementById('roomMsgInput').value = '';
      }

      //shared rendering function so live messages and history use the same code
      function appendMessage(msgData) {
        const li = document.createElement('li');
        li.textContent = `${msgData.senderName}: ${msgData.text}`;
        document.getElementById('messages').appendChild(li);
      }

      function sendMessage() {
        const receiverId = document.getElementById('receiverId').value;
        const text = document.getElementById('msgInput').value;
        if (!receiverId || !text) return;

        socket.emit('private message', { receiverId, text });
        document.getElementById('msgInput').value = '';
      }
    </script>
  </body>
</html>
